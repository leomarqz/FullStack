services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver2022-fullstack
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "MyStrongPass123"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserverdata:/var/opt/mssql
volumes:
  sqlserverdata:
  
# Comandos útiles(Docker):
# Levantar los contenedores en segundo plano:
#   docker-compose up -d
# Apagar y eliminar contenedores (no borra los volúmenes):
#   docker-compose down

# Comandos utiles(Proyectos):
# Ejecutar migraciones para recrear base de datos y tablas
#   cd TechoNotes.Infrastructure
#   dotnet ef database update

# -----------------------------------------------------------------------
# La creacion de migracion o recreacion de la base de datos y tablas
# se realiza desde el proyecto infrastructure (TechoNotes.Infrastructure)
# -----------------------------------------------------------------------